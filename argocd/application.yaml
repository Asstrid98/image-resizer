apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-resizer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/asstrid98/image-resizer.git
    targetRevision: main
    path: helm/image-resizer
    helm:
      valueFiles:
        - values-kind.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
